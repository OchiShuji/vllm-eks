name: test

on:
  push:
    branches:
      - main

jobs:
  tfsec:
    name: tfsec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: tf
          soft_fail: false

  kubesec:
    name: kubesec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubesec
        run: |
          curl -sSL https://github.com/controlplaneio/kubesec/releases/download/v2.14.2/kubesec_linux_amd64.tar.gz \
            | tar -xz kubesec
          sudo mv kubesec /usr/local/bin/

      - name: Scan manifests with kubesec
        run: |
          python3 << 'EOF'
          import subprocess, sys, json, os, re

          supported = re.compile(
            r'^kind:\s*(Pod|Deployment|DaemonSet|StatefulSet|ReplicaSet|ReplicationController|Job|CronJob)\s*$',
            re.MULTILINE
          )
          failed = 0

          for fname in sorted(os.listdir('manifests')):
            if not fname.endswith('.yaml'):
              continue
            fpath = os.path.join('manifests', fname)
            docs = [d for d in open(fpath).read().split('---') if d.strip()]
            for doc in docs:
              if not supported.search(doc):
                print(f"Skipping a doc in {fname} (unsupported kind)")
                continue
              print(f"Scanning doc in {fname}")
              result = subprocess.run(
                ['kubesec', 'scan', '/dev/stdin'],
                input=doc.encode(), capture_output=True
              )
              out = result.stdout.decode()
              print(out)
              try:
                score = json.loads(out)[0].get('score', 0)
                if score < 0:
                  print(f"FAIL: {fname} scored {score}")
                  failed = 1
              except Exception as e:
                print(f"Parse error in {fname}: {e}")
                failed = 1

          sys.exit(failed)
          EOF

