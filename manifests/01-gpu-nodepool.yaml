apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-nodepool
spec:
  template:
    metadata:
      labels:
        workload-type: gpu-nodepool
        node-type: gpu
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: gpu-nodeclass
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: eks.amazonaws.com/instance-category
          operator: In
          values: ["g"]
        - key: eks.amazonaws.com/instance-family
          operator: In
          values: ["g4dn"]
  limits:
    cpu: 1000
    memory: 1000Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 72h
---
# Replace $NODE_ROLE with: eksctl-vllm-cluster-cluster-AutoModeNodeRole-<suffix>
# Run: aws iam list-roles --query "Roles[?contains(RoleName,'vllm')].RoleName"
apiVersion: eks.amazonaws.com/v1
kind: NodeClass
metadata:
  name: gpu-nodeclass
spec:
  ephemeralStorage:
    iops: 3000
    size: 100Gi
  networkPolicy: DefaultDeny
  networkPolicyEventLogs: Enabled
  role: eksctl-vllm-cluster-cluster-AutoModeNodeRole-vl1nYpksyusp
  securityGroupSelectorTerms:
    - tags:
        kubernetes.io/cluster/vllm-cluster: owned
  subnetSelectorTerms:
    - tags:
        alpha.eksctl.io/cluster-name: vllm-cluster
